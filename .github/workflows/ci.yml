name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 2 # necessaire pour scripts/announce-patch-note.js (diff HEAD~1)

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.x'

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # audit repo-audit-todo.md point 2 : echoue si build/source.js, build/source.min.js,
      # build/styles.min.css, index.html ou src/core/i18n-resources.generated.js divergent du
      # resultat d'un rebuild frais -- CI ne commit jamais a la place du dev (voir
      # scripts/check_build_freshness.py, meme logique qu'en local via `npm run check-build`)
      - name: Verify build is up to date
        run: npm run check-build

      # audit repo-audit-todo.md point 17 : scripts/check-missing-translations.js existait deja
      # mais n'etait jamais lance automatiquement
      - name: Verify i18n keys (FR/EN parity)
        run: npm run check-i18n

      # audit perf P2 (2026-07-22) : l'image Open Graph avait DEJA ete recompressee par le passe,
      # puis un commit suivant a remis une version lourde (1051 Ko) sans que personne ne le voie --
      # Discord/Twitter la retelechargent a chaque partage de lien. Une correction annulable en
      # silence n'en est pas une : ce check fait echouer la CI si un asset og-* redepasse 400 Ko.
      - name: Verify shared asset weight (Open Graph)
        run: npm run check-assets

      # audit repo-audit-todo.md point 14 : tests/regression.spec.js (index.dev.html +
      # window.runRegressionTests()), tests/prod.spec.js (bundle minifie) et
      # tests/companions.spec.js (module isole) n'etaient jamais lances qu'en local
      - name: Run Playwright tests
        run: npm test

      # 2026-07-21, demande explicite : "on va arreter de passer par le bot pour les patchnote" --
      # remplace la suggestion initiale de repo-audit-todo.md (route sur le bot Discord Render) par
      # un appel direct a l'Edge Function Supabase "discord-log" (deja deployee, generique).
      # Uniquement sur push vers main (jamais sur une PR), et apres que les tests soient verts.
      # Le script lui-meme est idempotent (compare PATCH_NOTES[0].v a HEAD~1, ne poste que si la
      # derniere version a change) -- pas besoin de filtrer sur les fichiers modifies ici.
      - name: Announce new patch note on Discord
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        # ANNOUNCE_SECRET (secret repo) : verrouille les cibles publiques patch_fr/patch_en cote
        # Edge Function discord-log (durcissement audit #9) -- sans lui, l'annonce est refusee (403).
        env:
          ANNOUNCE_SECRET: ${{ secrets.ANNOUNCE_SECRET }}
        run: node scripts/announce-patch-note.js
